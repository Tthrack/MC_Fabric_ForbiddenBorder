name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Gradle 8.8
        run: |
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.8/bin" >> "$GITHUB_PATH"

      - name: Build
        run: gradle --version && gradle --no-daemon clean build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: forbidden-border-jar
          path: build/libs/*.jar
