name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.14.3

      - name: Build
        run: gradle --version && gradle build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: forbidden-border-jar
          path: build/libs/*.jar
